name: zero_cost_holding_app
description: 零成本持仓助手 - A股辅助分析工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 网络请求
  dio: ^5.4.0
  dio_cache_interceptor: ^3.5.0

  # GBK/GB2312 解码（新浪财经 F10 页面为 GBK 编码，Dart 标准库不支持）
  gbk_codec: ^0.4.0

  # 本地数据库
  sqflite: ^2.3.0
  path: ^1.8.3

  # K线图表
  k_chart: ^0.5.0

  # 图表（估值雷达）
  fl_chart: ^0.65.0

  # 本地存储（轻量Key-Value）
  shared_preferences: ^2.2.2

  # 时间处理
  intl: ^0.20.2

  # UI组件
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # 图标
  iconsax: ^0.0.8

  # 本地通知（盘中价格提醒）
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
